name: Validate Template

on:
  push:
    branches: [master]
    paths:
      - 'cli/**'
      - 'templates/**'
  pull_request:
    branches: [master]
    paths:
      - 'cli/**'
      - 'templates/**'
  workflow_dispatch:

jobs:
  scaffold-and-build-android:
    name: Template → Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Scaffold project with CLI
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          echo "" | node cli/bin/create-react-native-nim.js test-app
          cd test-app
          corepack use yarn@4.9.4

      - name: Init git repo (required by nimble)
        working-directory: test-app
        run: |
          git init
          git config user.email "ci@test.com"
          git config user.name "CI"
          git add -A
          git commit -m "init"

      - name: Setup Nim
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl
          cd /tmp
          curl -L -o nim.tar.xz "https://nim-lang.org/download/nim-2.0.8-linux_x64.tar.xz"
          tar -xf nim.tar.xz
          sudo mv nim-2.0.8 /opt/nim
          echo "/opt/nim/bin" >> $GITHUB_PATH
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android
        working-directory: test-app
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: make build-android

      - name: Stop Gradle daemon
        if: always()
        working-directory: test-app/android
        run: ./gradlew --stop

  scaffold-and-build-ios:
    name: Template → iOS Build
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Scaffold project with CLI
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          echo "" | node cli/bin/create-react-native-nim.js test-app
          cd test-app
          corepack use yarn@4.9.4

      - name: Init git repo (required by nimble)
        working-directory: test-app
        run: |
          git init
          git config user.email "ci@test.com"
          git config user.name "CI"
          git add -A
          git commit -m "init"

      - name: Setup Nim
        run: |
          brew install nim
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          working-directory: test-app/ios

      - name: Select Xcode 16.4
        run: sudo xcode-select -s "/Applications/Xcode_16.4.app/Contents/Developer"

      - name: Build iOS
        working-directory: test-app
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: make build-ios
