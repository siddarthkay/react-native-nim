name: Validate Template

on:
  push:
    branches: [master]
    paths:
      - 'cli/**'
      - 'mobile-app/**'
  pull_request:
    branches: [master]
    paths:
      - 'cli/**'
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  scaffold-and-build-android:
    name: Template → Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Configure git (needed for CLI git init)
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"

      - name: Scaffold project with CLI
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          node cli/bin/create-react-native-nim.js test-app --bundleId com.testcompany.testapp
          cd test-app
          corepack use yarn@4.9.4

      - name: Verify template replacements
        run: |
          echo "Checking for leftover template identifiers..."
          FAIL=0
          for pattern in "nimrnmobileapp" "nim-rn-mobile-app" "io.reactnativenim.app" "{{APP_NAME}}" "{{APP_SLUG}}" "{{BUNDLE_ID}}" "{{BUNDLE_PATH}}"; do
            if grep -r "$pattern" test-app/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.nim" --include="*.kt" --include="*.swift" --include="*.gradle" --include="*.pbxproj" --include="*.plist" --include="*.xml" --include="*.podspec" --include="*.mm" --include="*.h" --include="*.py" -l 2>/dev/null; then
              echo "FAIL: Found leftover '$pattern' in the above files"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "Template replacement verification failed!"
            exit 1
          fi
          echo "All template identifiers replaced successfully."

      - name: Setup Nim
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl
          cd /tmp
          curl -L -o nim.tar.xz "https://nim-lang.org/download/nim-2.0.8-linux_x64.tar.xz"
          tar -xf nim.tar.xz
          sudo mv nim-2.0.8 /opt/nim
          echo "/opt/nim/bin" >> $GITHUB_PATH
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android
        working-directory: test-app
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: make build-android

      - name: Stop Gradle daemon
        if: always()
        working-directory: test-app/android
        run: ./gradlew --stop

  scaffold-and-build-ios:
    name: Template → iOS Build
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Configure git (needed for CLI git init)
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"

      - name: Scaffold project with CLI
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          node cli/bin/create-react-native-nim.js test-app --bundleId com.testcompany.testapp
          cd test-app
          corepack use yarn@4.9.4

      - name: Verify template replacements
        run: |
          echo "Checking for leftover template identifiers..."
          FAIL=0
          for pattern in "nimrnmobileapp" "nim-rn-mobile-app" "io.reactnativenim.app" "{{APP_NAME}}" "{{APP_SLUG}}" "{{BUNDLE_ID}}" "{{BUNDLE_PATH}}"; do
            if grep -r "$pattern" test-app/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.nim" --include="*.kt" --include="*.swift" --include="*.gradle" --include="*.pbxproj" --include="*.plist" --include="*.xml" --include="*.podspec" --include="*.mm" --include="*.h" --include="*.py" -l 2>/dev/null; then
              echo "FAIL: Found leftover '$pattern' in the above files"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "Template replacement verification failed!"
            exit 1
          fi
          echo "All template identifiers replaced successfully."

      - name: Setup Nim
        run: |
          brew install nim
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          working-directory: test-app/ios

      - name: Select Xcode 16.4
        run: sudo xcode-select -s "/Applications/Xcode_16.4.app/Contents/Developer"

      - name: Build iOS
        working-directory: test-app
        env:
          YARN_ENABLE_HARDENED_MODE: '0'
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: make build-ios
