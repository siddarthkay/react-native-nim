name: Build Android

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: |
          corepack enable
          cd mobile-app && corepack use yarn@4.9.4

      - name: Setup Nim
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl
          cd /tmp
          curl -L -o nim.tar.xz "https://nim-lang.org/download/nim-2.0.8-linux_x64.tar.xz"
          tar -xf nim.tar.xz
          sudo mv nim-2.0.8 /opt/nim
          echo "/opt/nim/bin" >> $GITHUB_PATH
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android
        working-directory: mobile-app
        run: make build-android

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Stop Gradle daemon
        if: always()
        working-directory: mobile-app/android
        run: ./gradlew --stop
